<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="600" viewBox="0 0 1440 600">
  <defs>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="blur4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <!-- Círculo azul grande, esquina superior izquierda -->
  <circle cx="80" cy="100" r="220" fill="#89C4E1" opacity="0.25" filter="url(#blur1)"/>

  <!-- Círculo amarillo, esquina inferior derecha -->
  <circle cx="1360" cy="520" r="260" fill="#E8B84B" opacity="0.2" filter="url(#blur2)"/>

  <!-- Círculo verde agua, centro derecha -->
  <circle cx="1280" cy="120" r="180" fill="#7CBFB0" opacity="0.18" filter="url(#blur3)"/>

  <!-- Círculo azul chico, esquina inferior izquierda -->
  <circle cx="200" cy="560" r="150" fill="#89C4E1" opacity="0.15" filter="url(#blur4)"/>

  <!-- Círculo amarillo chico, centro izquierda -->
  <circle cx="20" cy="380" r="120" fill="#E8B84B" opacity="0.12" filter="url(#blur4)"/>
</svg>
